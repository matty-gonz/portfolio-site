<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Julian González — Project</title>
  <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Acme&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Kanit&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nanum+Gothic&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nanum+Gothic+Coding&display=swap">
  <link rel="stylesheet" href="../assets/css/bss-overrides.css">
  <link rel="stylesheet" href="../assets/css/custom.css">
  <style>
    /* ── GALLERY ──────────────────────────────────────────── */
    .gallery-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: zoom-in;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }
    .gallery-img:hover {
      border-color: var(--border-hover);
      transform: scale(1.02);
    }

    /* ── VIDEO ───────────────────────────────────────────── */
    .gallery-video {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: zoom-in;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
      background: #000;
    }
    .gallery-video:hover {
      border-color: var(--border-hover);
      transform: scale(1.02);
    }
    .lb-video {
      max-width: 88vw;
      max-height: 72vh;
      border-radius: 4px;
      display: block;
      outline: none;
    }

    .gallery-extra { display: none; }
    .gallery-extra.visible { display: contents; }

    .see-more-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(126,200,227,0.18);
      border-radius: 3px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-top: 0.75rem;
      display: inline-block;
    }
    .see-more-btn:hover {
      background: rgba(126,200,227,0.18);
      border-color: rgba(126,200,227,0.4);
    }

    /* ── LIGHTBOX ─────────────────────────────────────────── */
    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem 1.5rem;
    }
    .lb-overlay.open { display: flex; }

    .lb-img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
    }

    .lb-img {
      max-width: 88vw;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 4px;
      user-select: none;
      animation: lbFade 0.18s ease;
      display: block;
    }
    @keyframes lbFade {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* caption box below image */
    .lb-caption-box {
      width: 100%;
      max-width: 860px;
      margin-top: 1rem;
      padding: 0.75rem 1.1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      min-height: 56px;
      flex-shrink: 0;
    }

    .lb-caption-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .lb-caption-text {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin: 0;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.6rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 10000;
      line-height: 1;
    }
    .lb-btn:hover { background: rgba(126,200,227,0.2); border-color: rgba(126,200,227,0.3); }
    .lb-prev { left: 1.5rem; }
    .lb-next { right: 1.5rem; }

    .lb-close {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 10000;
      transition: color 0.2s;
      line-height: 1;
      padding: 0;
    }
    .lb-close:hover { color: #fff; }

    /* ── COUNTER + FILMSTRIP ─────────────────────────────── */
    .lb-top-bar {
      position: fixed;
      top: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      pointer-events: none;
    }

    .lb-counter {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      padding: 4px 14px;
      white-space: nowrap;
      pointer-events: none;
    }

    .lb-filmstrip {
      display: flex;
      gap: 5px;
      max-width: 70vw;
      overflow-x: auto;
      padding: 2px 4px;
      scrollbar-width: none;
      pointer-events: all;
    }
    .lb-filmstrip::-webkit-scrollbar { display: none; }

    .lb-thumb {
      width: 48px;
      height: 36px;
      object-fit: cover;
      border-radius: 2px;
      border: 2px solid rgba(255,255,255,0.12);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.5;
      background: #111;
    }
    .lb-thumb:hover { opacity: 0.85; border-color: rgba(255,255,255,0.3); }
    .lb-thumb.active { border-color: var(--accent); opacity: 1; }

    .lb-thumb-video {
      width: 48px;
      height: 36px;
      object-fit: cover;
      border-radius: 2px;
      border: 2px solid rgba(255,255,255,0.12);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.5;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
    }
    .lb-thumb-video.active { border-color: var(--accent); opacity: 1; }
    .lb-thumb-video:hover { opacity: 0.85; border-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <!-- LIGHTBOX -->
  <div class="lb-overlay" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <button class="lb-btn lb-prev" id="lb-prev">‹</button>
    <button class="lb-btn lb-next" id="lb-next">›</button>
    <div class="lb-top-bar">
      <div class="lb-counter" id="lb-counter"></div>
      <div class="lb-filmstrip" id="lb-filmstrip"></div>
    </div>
    <div class="lb-img-wrap">
      <img class="lb-img" id="lb-img" src="" alt="" style="display:none;">
      <video class="lb-video" id="lb-video" controls style="display:none;"></video>
    </div>
    <div class="lb-caption-box">
      <div class="lb-caption-title" id="lb-caption-title"></div>
      <p class="lb-caption-text" id="lb-caption-text"></p>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><strong>Matthew Julian González</strong></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="../index.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="../about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="../contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <a class="back-link" href="../index.html">← Back to projects</a>
          <div class="project-detail-subtitle" id="proj-subtitle"></div>
          <h1 class="project-detail-title" id="proj-title"></h1>
          <div class="row g-3 mb-2" id="proj-gallery"></div>
          <div id="gallery-toggle-wrap"></div>
          <div id="proj-description" class="mt-4"></div>
          <hr class="section-divider">
          <div class="section-label">Skills</div>
          <div class="card-skills mt-2" id="proj-skills"></div>
          <div id="proj-error" style="display:none;">
            <p class="project-desc">Project not found.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/bootstrap/js/bootstrap.min.js"></script>
  <script src="../assets/js/main-4.js"></script>
  <script>
    const GALLERY_LIMIT = 4;

    // ── LIGHTBOX ───────────────────────────────────────────
    let lbImages = []; // array of {src, caption} objects
    let lbIndex  = 0;

    function buildFilmstrip() {
      const strip = document.getElementById('lb-filmstrip');
      strip.innerHTML = lbImages.map((item, i) => {
        const src = typeof item === 'object' ? item.src : item;
        if (isVideo(src)) {
          return `<div class="lb-thumb-video" data-index="${i}" title="Video">▶</div>`;
        } else {
          return `<img class="lb-thumb" src="${src}" data-index="${i}" alt="">`;
        }
      }).join('');

      strip.addEventListener('click', e => {
        const el = e.target.closest('[data-index]');
        if (el) lbOpen(parseInt(el.dataset.index));
      });
    }

    function lbOpen(index) {
      lbIndex = index;
      buildFilmstrip();
      lbShow();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function isVideo(src) {
      return /\.(mp4|mov|webm|ogg)$/i.test(src);
    }

    function lbShow() {
      const item = lbImages[lbIndex];
      const src  = typeof item === 'object' ? item.src : item;
      const caption = typeof item === 'object' ? (item.caption || '') : '';

      const lbImg   = document.getElementById('lb-img');
      const lbVid   = document.getElementById('lb-video');

      if (isVideo(src)) {
        lbImg.style.display = 'none';
        lbVid.style.display = 'block';
        lbVid.pause();
        lbVid.src = src;
        lbVid.load();
      } else {
        lbVid.style.display = 'none';
        lbVid.pause();
        lbVid.src = '';
        lbImg.style.display = 'block';
        // animate
        lbImg.classList.remove('lb-img');
        void lbImg.offsetWidth;
        lbImg.classList.add('lb-img');
        lbImg.src = src;
      }

      // counter
      document.getElementById('lb-counter').textContent =
        (lbIndex + 1) + ' / ' + lbImages.length;

      // filmstrip active state
      document.querySelectorAll('.lb-thumb, .lb-thumb-video').forEach((el, i) => {
        el.classList.toggle('active', i === lbIndex);
      });
      // scroll active thumb into view
      const activeThumb = document.querySelector('.lb-thumb.active, .lb-thumb-video.active');
      if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

      // caption box
      const rawName = src.split('/').pop().replace(/\.[^.]+$/, ''); // strip path + extension
      const title   = rawName;
      document.getElementById('lb-caption-title').textContent = title;
      document.getElementById('lb-caption-text').textContent  = caption;
    }

    function lbStep(dir) {
      lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
      lbShow();
    }

    function lbClose() {
      const lbVid = document.getElementById('lb-video');
      lbVid.pause();
      lbVid.src = '';
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lb-close').addEventListener('click', lbClose);
    document.getElementById('lb-prev').addEventListener('click', () => lbStep(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbStep(1));
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target.id === 'lightbox') lbClose();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  lbStep(-1);
      if (e.key === 'ArrowRight') lbStep(1);
      if (e.key === 'Escape')     lbClose();
    });

    // ── PROJECT LOADER ─────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');

    if (!id) {
      document.getElementById('proj-error').style.display = 'block';
    } else {
      fetch('../projects.json')
        .then(r => r.json())
        .then(projects => {
          const p = projects.find(x => x.id === id);
          if (!p) { document.getElementById('proj-error').style.display = 'block'; return; }

          document.title = `Matthew Julian González — ${p.title}`;
          document.getElementById('proj-subtitle').textContent = p.subtitle;
          document.getElementById('proj-title').textContent    = p.title;

          // normalize images — support both string and {src, caption} formats
          lbImages = (p.images && p.images.length > 0)
            ? p.images.map(img => typeof img === 'string' ? { src: img, caption: '' } : img)
            : [];

          // ── GALLERY ────────────────────────────────────────
          const gallery    = document.getElementById('proj-gallery');
          const toggleWrap = document.getElementById('gallery-toggle-wrap');

          if (lbImages.length > 0) {
            gallery.innerHTML = lbImages.map((item, i) => {
              const isVid = /\.(mp4|mov|webm|ogg)$/i.test(item.src);
              const el = isVid
                ? `<video class="gallery-video" data-index="${i}" muted loop playsinline preload="metadata">
                     <source src="${item.src}">
                   </video>`
                : `<img
                     src="${item.src}"
                     class="gallery-img"
                     alt="${p.title} ${i + 1}"
                     data-index="${i}"
                     onerror="this.parentElement.style.display='none'"
                   >`;
              return `<div class="col-6 col-sm-3 ${i >= GALLERY_LIMIT ? 'gallery-extra' : ''}">${el}</div>`;
            }).join('');

            // autoplay video thumbnails on hover
            gallery.addEventListener('mouseenter', e => {
              const v = e.target.closest('.gallery-video');
              if (v) v.play();
            }, true);
            gallery.addEventListener('mouseleave', e => {
              const v = e.target.closest('.gallery-video');
              if (v) { v.pause(); v.currentTime = 0; }
            }, true);

            if (lbImages.length > GALLERY_LIMIT) {
              const remaining = lbImages.length - GALLERY_LIMIT;
              const btn = document.createElement('button');
              btn.className = 'see-more-btn';
              btn.textContent = `+ ${remaining} more`;
              btn.addEventListener('click', () => lbOpen(GALLERY_LIMIT));
              toggleWrap.appendChild(btn);
            }

            gallery.addEventListener('click', e => {
              const el = e.target.closest('.gallery-img, .gallery-video');
              if (el) lbOpen(parseInt(el.dataset.index));
            });

          } else {
            gallery.innerHTML = `
              <div class="col-6 col-sm-3"><div class="gallery-cell"><span>image 1</span></div></div>
              <div class="col-6 col-sm-3"><div class="gallery-cell"><span>image 2</span></div></div>
              <div class="col-6 col-sm-3"><div class="gallery-cell"><span>image 3</span></div></div>
              <div class="col-6 col-sm-3"><div class="gallery-cell"><span>image 4</span></div></div>
            `;
          }

          // ── DESCRIPTION ────────────────────────────────────
          if (p.description && p.description.length > 0) {
            document.getElementById('proj-description').innerHTML =
              p.description.map(para => `<p class="project-desc">${para}</p>`).join('');
          }

          // ── SKILLS ─────────────────────────────────────────
          if (p.skills && p.skills.length > 0) {
            document.getElementById('proj-skills').innerHTML =
              p.skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
          }
        })
        .catch(() => { document.getElementById('proj-error').style.display = 'block'; });
    }
  </script>
</body>
</html>
